services:
  - type: web
    name: habittrack
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run install:all && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
